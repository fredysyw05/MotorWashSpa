<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Wash Spa | Restablecer Contraseña</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/casco.png" type="image/png">
</head>

<body>

    <!-- HEADER UNIFICADO -->
    <header class="site-header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="Motor Wash Spa">
            </a>
        </div>
    </header>

    <!-- SECCIÓN FORMULARIO DE CAMBIO -->
    <section class="contact section bg-light">
        <div class="container" style="max-width: 450px;">
            <h2 style="text-align: center;">Crea tu nueva contraseña</h2>
            <p style="text-align: center; color: #666; margin-bottom: 25px; font-size: 0.95rem;">
                Por seguridad, elige una contraseña fuerte que no uses en otros sitios web.
            </p>

            <form id="restablecer-form" class="contact-form">
                <input type="password" id="nueva-pass" placeholder="Nueva contraseña" required>
                <input type="password" id="confirmar-pass" placeholder="Confirma tu nueva contraseña" required>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                    Actualizar contraseña
                </button>
            </form>

            <p id="restablecer-mensaje"
                style="margin-top: 20px; font-weight: bold; text-align: center; font-size: 0.95rem;"></p>
        </div>
    </section>

    <!-- Conectamos con el controlador frontend -->
    <script src="js/restablecer.js"></script>
</body>

</html>
