<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Wash Spa | Mi Panel</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/casco.png" type="image/png">
</head>

<body class="bg-light">

    <!-- HEADER -->
    <header class="site-header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="Motor Wash Spa">
            </a>
            <nav class="site-nav" id="navbar">
                <ul>
                    <li><a href="index.html">🏠︎Inicio</a></li>
                    <li><a href="services.html">✨Servicios</a></li>
                    <li><a href="reservations.html">📅Reservas</a></li>
                    <li><a href="gallery.html">📸Galería</a></li>
                    <li><a href="about.html">📣Acerca de</a></li>
                    <li><a href="contact.html">📩Contacto</a></li>
                    <li id="auth-nav-item"><a href="login.html" class="nav-login-btn">🚀Entrar/Registro</a></li>
                </ul>
            </nav>
            <button class="menu-toggle" id="menu-btn">☰</button>
        </div>
    </header>

    <main class="container" style="margin-top: 40px; margin-bottom: 60px; max-width: 1000px;">

        <section class="profile-card"
            style="background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
            <div>
                <h1 style="margin: 0; color: #2c3e50; font-size: 1.8rem;">¡Hola, <span
                        id="perf-nombre">Cargando...</span>! 👋</h1>
                <p style="margin: 5px 0 0 0; color: #7f8c8d; font-size: 0.95rem;">
                    📧 <span id="perf-correo">...</span> | 📱 <span id="perf-telefono">...</span>
                </p>
            </div>

            <!-- CONTENEDOR DE LA PLACA MEJORADO -->
            <div style="text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px;">
                <!-- La etiqueta queda afuera, limpia y elegante -->
                <span
                    style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #7f8c8d; font-weight: bold; display: block;">
                    Vehículo Asociado
                </span>
                <!-- La placa real con relieve metálico colombiano -->
                <strong id="perf-placa" class="placa-colombiana">---</strong>
            </div>
        </section>

        <div class="panel-grid" style="display: grid; grid-template-columns: 1fr; gap: 30px;">

            <section
                style="background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                <h2
                    style="color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; display: flex; align-items: center; gap: 10px;">
                    📅 Próximas Citas
                </h2>
                <div id="reservas-activas-contenedor"
                    style="margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px;">
                    <p style="color: #888; grid-column: 1 / -1; text-align: center;">Cargando tus próximas citas...</p>
                </div>
            </section>

            <section
                style="background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                <h2
                    style="color: #2c3e50; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; margin-top: 0; display: flex; align-items: center; gap: 10px;">
                    ✅ Historial de Lavados
                </h2>
                <div id="historial-contenedor" style="margin-top: 20px;">
                    <p style="color: #888; text-align: center;">Cargando historial de servicios...</p>
                </div>
            </section>

        </div>
    </main>

    <script src="js/cliente.js"></script>
    <script src="js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
