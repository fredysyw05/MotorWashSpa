<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Test Animaciones</title>
<style>
  body { font-family: Arial, sans-serif; padding: 40px; background:#f8f9fb; }
  .card { width:320px; margin:20px auto; background:#fff; border-radius:10px; box-shadow:0 6px 18px rgba(0,0,0,.08); overflow:hidden; }
  .card img { width:100%; height:180px; object-fit:cover; display:block; }
  .card .pad { padding:16px; }
  /* Animaciones (pégalas al final de tu style.css) */
  .fade-in { opacity:0; transform:translateY(15px); animation:fadeInAnim .8s ease-out forwards; }
  @keyframes fadeInAnim { to { opacity:1; transform:translateY(0); } }
  .slide-left { opacity:0; transform:translateX(-30px); animation:slideLeft .8s ease-out forwards; }
  @keyframes slideLeft { to { opacity:1; transform:translateX(0); } }
  .slide-right { opacity:0; transform:translateX(30px); animation:slideRight .8s ease-out forwards; }
  @keyframes slideRight { to { opacity:1; transform:translateX(0); } }

  .card:hover { transform:translateY(-6px); box-shadow:0 14px 30px rgba(0,0,0,.12); transition:all .25s; }
</style>
</head>
<body>

<h2>Test: Fade-in & Slide-in</h2>

<div class="card fade-in">
  <img src="https://picsum.photos/seed/1/800/400" alt="">
  <div class="pad"><h3>Fade In</h3><p>Esta tarjeta usa fade-in.</p></div>
</div>

<div class="card slide-left">
  <img src="https://picsum.photos/seed/2/800/400" alt="">
  <div class="pad"><h3>Slide Left</h3><p>Entra desde la izquierda.</p></div>
</div>

<div class="card slide-right">
  <img src="https://picsum.photos/seed/3/800/400" alt="">
  <div class="pad"><h3>Slide Right</h3><p>Entra desde la derecha.</p></div>
</div>

</body>
</html>
