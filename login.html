<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Wash Spa | Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="contact section bg-light">
        <div class="container">
            <h2>Iniciar Sesión</h2>
            <form id="login-form" class="contact-form">
                <input type="email" id="login-correo" placeholder="Tu correo electrónico" required>
                <input type="password" id="login-password" placeholder="Tu contraseña" required>
                <button type="submit" class="btn btn-primary">Ingresar</button>
            </form>
            <p id="login-mensaje" style="margin-top: 15px; font-weight: bold; text-align: center;"></p>
        </div>
    </section>

    <script src="js/auth.js"></script>
</body>
</html>
