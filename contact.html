<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Wash Spa | Contacto</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/casco.png" type="image/png">
</head>

<body>

    <!-- HEADER -->
    <header class="site-header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="Motor Wash Spa">
            </a>
            <nav class="site-nav" id="navbar">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="services.html">Servicios</a></li>
                    <li><a href="reservations.html">Reservas</a></li>
                    <li><a href="gallery.html">Galería</a></li>
                    <li><a href="about.html">Acerca de</a></li>
                    <li><a href="contact.html">Contacto</a></li>
                </ul>
            </nav>
            <button class="menu-toggle" id="menu-btn">☰</button>
        </div>
    </header>

    <!-- CONTACTO -->
    <section id="contacto" class="contact section bg-light">
        <div class="container">
            <h2>Contáctanos</h2>
            <form class="contact-form fade-in">
                <input type="text" placeholder="Tu nombre" required>
                <input type="email" placeholder="Tu correo" required>
                <textarea rows="5" placeholder="Tu mensaje" required></textarea>
                <button type="submit" class="btn btn-primary">Enviar mensaje</button>
            </form>
            <div class="contact-info">
                <p>📍 Medellín, Colombia</p>
                <p>📞 +57 300 000 0000</p>
                <p>✉️ contacto@motorwashspa.com</p>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container footer-content">
            <p>© 2025 Motor Wash Spa — Todos los derechos reservados</p>
            <div class="social-links">
                <a href="#">Facebook</a>
                <a href="#">Instagram</a>
                <a href="#">WhatsApp</a>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>

</html>
