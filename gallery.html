<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Wash Spa | Galería</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/casco.png" type="image/png">
</head>

<body>

    <!-- HEADER -->
    <header class="site-header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="Motor Wash Spa">
            </a>
            <nav class="site-nav" id="navbar">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="services.html">Servicios</a></li>
                    <li><a href="reservations.html">Reservas</a></li>

    <section id="galeria" class="gallery section fade-in">
        <div class="container">
            <h2>Galería</h2>
            <div class="gallery-grid">

            <p>© 2025 Motor Wash Spa — Todos los derechos reservados</p>
            <div class="social-links">
