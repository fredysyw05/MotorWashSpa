<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Wash Spa | Recuperar Contraseña</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/casco.png" type="image/png">
</head>

<body>

    <!-- HEADER UNIFICADO -->
    <header class="site-header">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="Motor Wash Spa">
            </a>
            <nav class="site-nav" id="navbar">
                <ul>
                    <li><a href="index.html">🏠︎Inicio</a></li>
                    <li><a href="services.html">✨Servicios</a></li>
                    <li><a href="reservations.html">📅Reservas</a></li>
                    <li><a href="gallery.html">📸Galería</a></li>
                    <li><a href="about.html">📣Acerca de</a></li>
                    <li><a href="contact.html">📩Contacto</a></li>
                    <li id="auth-nav-item"><a href="login.html" class="nav-login-btn">🚀Entrar/Registro</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- SECCIÓN DE RECUPERACIÓN -->
    <section class="contact section bg-light">
        <div class="container" style="max-width: 450px;">
            <h2 style="text-align: center;">¿Olvidaste tu contraseña?</h2>
            <p style="text-align: center; color: #666; margin-bottom: 25px; font-size: 0.95rem;">
                Ingresa tu correo electrónico registrado y te enviaremos un enlace seguro para restablecer tu clave.
            </p>

            <form id="recuperar-form" class="contact-form">
                <input type="email" id="recuperar-correo" placeholder="Correo electrónico de tu cuenta" required>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                    Enviar enlace de recuperación
                </button>
            </form>

            <p id="recuperar-mensaje"
                style="margin-top: 20px; font-weight: bold; text-align: center; font-size: 0.95rem;"></p>

            <p style="text-align: center; margin-top: 25px; font-size: 0.9rem;">
                <a href="login.html" style="color: #3498db; font-weight: bold; text-decoration: none;">
                    ← Volver al Inicio de Sesión
                </a>
            </p>
        </div>
    </section>

    <!-- Script exclusivo para procesar la solicitud -->
    <script src="js/recuperar.js"></script>
</body>

</html>
