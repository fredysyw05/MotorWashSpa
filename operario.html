<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Wash Spa | Panel Operario</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/casco.png" type="image/png">
</head>

<body>
    <header class="site-header">
        <div class="container header-content">
            <span class="logo" style="color: white; font-weight: bold;">Trabajo</span>

            <!-- 🌐 BOTÓN DE ESCAPE Y CERRAR SESIÓN JUNTO -->
            <div style="display: flex; gap: 15px; align-items: center;">
                <a href="index.html" style="color: #ccc; text-decoration: none; font-size: 0.9rem;">↩Volver al
                    Inicio</a>
                <button id="btn-cerrar-sesion" class="btn btn-danger">Cerrar Sesión</button>
            </div>
        </div>
    </header>

    <section class="section bg-light">
        <div class="container">
            <h2>Hola, Operario <span id="nombre-operario" style="color: #007bff;"></span> 🛠️</h2>
            <p>Estas son las órdenes de lavado asignadas y pendientes para el día de hoy:</p>

            <!-- TABLA DE TAREAS PENDIENTES / EN CURSO -->
            <div style="overflow-x: auto; margin-top: 20px;">
                <table class="tabla-servicios" style="width: 100%; border-collapse: collapse; background: white;">
                    <thead>
                        <tr style="background-color: #333; color: white; text-align: left;">
                            <th style="padding: 12px;">⏰Hora</th>
                            <th style="padding: 12px;">📅Fecha</th>
                            <th style="padding: 12px;">👤Cliente</th>
                            <th style="padding: 12px;">✨Servicio</th>
                            <th style="padding: 12px;">🚦Estado</th>
                            <th style="padding: 12px; text-align: center;">⌛Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lista-tareas">
                    </tbody>
                </table>
            </div>
            <p id="error-tarea" style="color: red; font-weight: bold; margin-top: 15px;"></p>

            <!-- 📜SECCIÓN: HISTORIAL DE TRABAJOS REALIZADOS -->
            <div style="overflow-x: auto; margin-top: 50px;">
                <h3 style="margin-bottom: 15px; color: #333; display: flex; align-items: center; gap: 10px;">
                    <span>Historial de Trabajos Realizados</span> ✅
                </h3>
                <table class="tabla-servicios" style="width: 100%; border-collapse: collapse; background: white;">
                    <thead>
                        <tr style="background-color: #333; color: white; text-align: left;">
                            <th style="padding: 12px;">⏰Hora</th>
                            <th style="padding: 12px;">📅Fecha</th>
                            <th style="padding: 12px;">👤Cliente</th>
                            <th style="padding: 12px;">✨Servicio</th>
                            <th style="padding: 12px;">🚦Estado</th>
                        </tr>
                    </thead>
                    <tbody id="lista-historial">
                        <!-- Aquí se renderizan los trabajos finalizados -->
                    </tbody>
                </table>
            </div>
            <p id="error-historial" style="color: red; font-weight: bold; margin-top: 15px;"></p>

        </div>
    </section>

    <script src="js/operario.js"></script>
</body>

</html>
